<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tonight! 受付会計</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f5;
      color: #1a1a1a;
    }
    
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f0f0f0;
      --color-background-tertiary: #f5f5f5;
      --color-background-info: #e6f1fb;
      --color-background-success: #eaf3de;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-text-info: #0c447c;
      --color-text-success: #27500a;
      --color-border-tertiary: rgba(0, 0, 0, 0.1);
      --color-border-secondary: rgba(0, 0, 0, 0.2);
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #2a2a2a;
        --color-background-tertiary: #0f0f0f;
        --color-background-info: #042c53;
        --color-background-success: #173404;
        --color-text-primary: #ffffff;
        --color-text-secondary: #cccccc;
        --color-text-tertiary: #999999;
        --color-text-info: #b5d4f4;
        --color-text-success: #c0dd97;
        --color-border-tertiary: rgba(255, 255, 255, 0.1);
        --color-border-secondary: rgba(255, 255, 255, 0.2);
      }
    }
    
    #root {
      background-color: var(--color-background-tertiary);
      min-height: 100vh;
      padding: 1rem;
    }
    
    input[type="number"],
    input[type="checkbox"],
    input[type="text"] {
      font-family: inherit;
      font-size: 16px;
    }
    
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background-color: var(--color-background-primary);
      color: var(--color-text-primary);
      transition: border-color 0.2s;
    }
    
    input[type="number"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--color-border-secondary);
    }
    
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    
    button {
      font-family: inherit;
      padding: 16px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background-color: var(--color-background-secondary);
      color: var(--color-text-primary);
      cursor: pointer;
      font-weight: 500;
      font-size: 16px;
      transition: all 0.2s;
    }
    
    button:hover:not(:disabled) {
      background-color: var(--color-background-secondary);
      border-color: var(--color-border-secondary);
    }
    
    button:active:not(:disabled) {
      transform: scale(0.98);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    button[style*="background: var(--color-background-info)"] {
      border: 0.5px solid var(--color-border-secondary);
    }
    
    button[style*="background: var(--color-background-success)"] {
      border: 0.5px solid var(--color-border-secondary);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;

    const PRICES = {
      entrance: 1000,
      drink: 500,
      box: 10000
    };

    function ReceptionApp() {
      const [page, setPage] = useState('setup');
      const [initialAmount, setInitialAmount] = useState('');
      const [initialTickets, setInitialTickets] = useState('');
      
      const [generalCount, setGeneralCount] = useState(0);
      const [tmpCount, setTmpCount] = useState(0);
      const [entries, setEntries] = useState([]);
      const [paidAmount, setPaidAmount] = useState('');
      const [changeAmount, setChangeAmount] = useState(null);
      const [drinkTicketGiven, setDrinkTicketGiven] = useState(false);
      const [moneyReceived, setMoneyReceived] = useState(false);
      
      const handleStartEvent = () => {
        if (!initialAmount || !initialTickets) {
          alert('初期金額とドリンクチケット枚数を入力してください');
          return;
        }
        setPage('counting');
      };

      const handleAddCustomer = (type) => {
        const totalPrice = PRICES.entrance + PRICES.drink;
        const newEntry = {
          id: Date.now(),
          type,
          price: totalPrice,
          timestamp: new Date().toLocaleTimeString('ja-JP'),
          paid: false
        };
        
        if (type === 'general') {
          setGeneralCount(generalCount + 1);
        } else {
          setTmpCount(tmpCount + 1);
        }
        
        setEntries([...entries, newEntry]);
      };

      const handlePayment = () => {
        if (!paidAmount) {
          alert('預かり金額を入力してください');
          return;
        }
        
        const totalPrice = PRICES.entrance + PRICES.drink;
        const change = parseInt(paidAmount) - totalPrice;
        
        if (change < 0) {
          alert('不足金です');
          return;
        }
        
        setChangeAmount(change);
        setPage('checklist');
      };

      const handleCompleteEntry = () => {
        setEntries(entries.map(e => (entries[entries.length - 1].id === e.id ? { ...e, paid: true } : e)));
        setPaidAmount('');
        setChangeAmount(null);
        setDrinkTicketGiven(false);
        setMoneyReceived(false);
        setPage('counting');
      };

      const totalRevenue = (generalCount + tmpCount) * (PRICES.entrance + PRICES.drink);
      const totalAmount = parseInt(initialAmount) + totalRevenue;
      const profit = generalCount * PRICES.entrance - PRICES.box;

      const TallyMarks = ({ count }) => {
        const groups = Math.floor(count / 5);
        const remainder = count % 5;
        
        return (
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              {Array.from({ length: groups }).map((_, i) => (
                <div
                  key={`group-${i}`}
                  style={{
                    width: '32px',
                    height: '32px',
                    border: '1px solid var(--color-text-primary)',
                    borderRadius: '4px',
                    position: 'relative',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center'
                  }}
                >
                  <svg width="32" height="32" style={{ position: 'absolute' }}>
                    <line x1="4" y1="4" x2="28" y2="28" stroke="var(--color-text-primary)" strokeWidth="1.5" />
                    <line x1="28" y1="4" x2="4" y2="28" stroke="var(--color-text-primary)" strokeWidth="1.5" />
                    <line x1="4" y1="16" x2="28" y2="16" stroke="var(--color-text-primary)" strokeWidth="1.5" />
                    <line x1="16" y1="4" x2="16" y2="28" stroke="var(--color-text-primary)" strokeWidth="1.5" />
                  </svg>
                </div>
              ))}
              {Array.from({ length: remainder }).map((_, i) => (
                <div
                  key={`line-${i}`}
                  style={{
                    width: '6px',
                    height: '32px',
                    backgroundColor: 'var(--color-text-primary)',
                    borderRadius: '2px'
                  }}
                />
              ))}
            </div>
          </div>
        );
      };

      return (
        <div>
          {page === 'setup' && (
            <div style={{ maxWidth: '400px', margin: '0 auto' }}>
              <h1 style={{ fontSize: '24px', fontWeight: 500, marginBottom: '2rem', textAlign: 'center' }}>tonight!</h1>
              <h2 style={{ fontSize: '18px', fontWeight: 500, marginBottom: '1.5rem' }}>イベント準備</h2>
              
              <div style={{ marginBottom: '1.5rem' }}>
                <label style={{ display: 'block', fontSize: '14px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>
                  開始時の金額（円）
                </label>
                <input
                  type="number"
                  value={initialAmount}
                  onChange={(e) => setInitialAmount(e.target.value)}
                  placeholder="0"
                />
              </div>
              
              <div style={{ marginBottom: '2rem' }}>
                <label style={{ display: 'block', fontSize: '14px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>
                  ドリンクチケット枚数
                </label>
                <input
                  type="number"
                  value={initialTickets}
                  onChange={(e) => setInitialTickets(e.target.value)}
                  placeholder="0"
                />
              </div>
              
              <button onClick={handleStartEvent} style={{ width: '100%' }}>
                受付開始
              </button>
            </div>
          )}

          {page === 'counting' && (
            <div style={{ maxWidth: '400px', margin: '0 auto' }}>
              <h2 style={{ fontSize: '18px', fontWeight: 500, marginBottom: '1.5rem' }}>来場者カウント</h2>
              
              <div style={{ backgroundColor: 'var(--color-background-primary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-lg)', padding: '1.25rem', marginBottom: '2rem' }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '1.5rem' }}>
                  <div>
                    <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>一般入場</p>
                    <p style={{ fontSize: '32px', fontWeight: 500, marginBottom: '1rem' }}>{generalCount}</p>
                    <TallyMarks count={generalCount} />
                  </div>
                  <div>
                    <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>TMPメンバー</p>
                    <p style={{ fontSize: '32px', fontWeight: 500, marginBottom: '1rem' }}>{tmpCount}</p>
                    <TallyMarks count={tmpCount} />
                  </div>
                </div>
              </div>
              
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '1.5rem' }}>
                <button onClick={() => handleAddCustomer('general')} style={{ backgroundColor: 'var(--color-background-info)', color: 'var(--color-text-info)', padding: '24px' }}>
                  一般を追加
                </button>
                <button onClick={() => handleAddCustomer('tmp')} style={{ backgroundColor: 'var(--color-background-success)', color: 'var(--color-text-success)', padding: '24px' }}>
                  TMPを追加
                </button>
              </div>
              
              {(generalCount > 0 || tmpCount > 0) && (
                <button onClick={() => {
                  if (entries.length === 0) {
                    alert('お客さんを追加してください');
                    return;
                  }
                  setPaidAmount('');
                  setChangeAmount(null);
                  setPage('payment');
                }} style={{ width: '100%', marginBottom: '1rem' }}>
                  次へ（支払い処理へ）
                </button>
              )}
              
              {entries.length > 0 && (
                <button onClick={() => setPage('result')} style={{ width: '100%', background: 'transparent', marginBottom: '1rem' }}>
                  全て支払い済みの場合は結果へ
                </button>
              )}
            </div>
          )}

          {page === 'payment' && entries.length > 0 && !entries[entries.length - 1].paid && (
            <div style={{ maxWidth: '400px', margin: '0 auto' }}>
              <h2 style={{ fontSize: '18px', fontWeight: 500, marginBottom: '1.5rem' }}>支払い処理</h2>
              
              <div style={{ backgroundColor: 'var(--color-background-primary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-lg)', padding: '1.25rem', marginBottom: '1.5rem' }}>
                <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>お客様区分</p>
                <p style={{ fontSize: '16px', fontWeight: 500, marginBottom: '1.5rem' }}>
                  {entries[entries.length - 1].type === 'general' ? '一般入場' : 'TMPメンバー'}
                </p>
                
                <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>お支払い金額</p>
                <p style={{ fontSize: '32px', fontWeight: 500, marginBottom: '1.5rem' }}>¥{(PRICES.entrance + PRICES.drink).toLocaleString()}</p>
                
                <div style={{ borderTop: '0.5px solid var(--color-border-tertiary)', paddingTop: '1rem' }}>
                  <label style={{ display: 'block', fontSize: '14px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>
                    預かり金額（円）
                  </label>
                  <input
                    type="number"
                    value={paidAmount}
                    onChange={(e) => {
                      setPaidAmount(e.target.value);
                      const total = PRICES.entrance + PRICES.drink;
                      const change = parseInt(e.target.value) - total;
                      if (change >= 0) {
                        setChangeAmount(change);
                      }
                    }}
                    placeholder="0"
                    autoFocus
                    style={{ fontSize: '24px', fontWeight: 500 }}
                  />
                </div>
              </div>
              
              {changeAmount !== null && (
                <div style={{ backgroundColor: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '1rem', marginBottom: '1.5rem', textAlign: 'center' }}>
                  <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>お釣り</p>
                  <p style={{ fontSize: '28px', fontWeight: 500 }}>¥{changeAmount.toLocaleString()}</p>
                </div>
              )}
              
              <button onClick={handlePayment} disabled={changeAmount === null} style={{ width: '100%' }}>
                チェックリストへ
              </button>
            </div>
          )}

          {page === 'checklist' && (
            <div style={{ maxWidth: '400px', margin: '0 auto' }}>
              <h2 style={{ fontSize: '18px', fontWeight: 500, marginBottom: '1.5rem' }}>受付確認</h2>
              
              <div style={{ backgroundColor: 'var(--color-background-primary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-lg)', padding: '1.25rem', marginBottom: '1.5rem' }}>
                <div style={{ marginBottom: '1.5rem' }}>
                  <label style={{ display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer', marginBottom: '12px' }}>
                    <input
                      type="checkbox"
                      checked={drinkTicketGiven}
                      onChange={(e) => setDrinkTicketGiven(e.target.checked)}
                    />
                    <span style={{ fontSize: '15px' }}>ドリンクチケットを渡した</span>
                  </label>
                  
                  <label style={{ display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer' }}>
                    <input
                      type="checkbox"
                      checked={moneyReceived}
                      onChange={(e) => setMoneyReceived(e.target.checked)}
                    />
                    <span style={{ fontSize: '15px' }}>お金を受け取った</span>
                  </label>
                </div>
                
                <div style={{ fontSize: '13px', color: 'var(--color-text-secondary)', lineHeight: '1.7' }}>
                  <p style={{ marginBottom: '12px' }}>〇 入場料 ¥{PRICES.entrance.toLocaleString()} を受け取った</p>
                  <p style={{ marginBottom: '12px' }}>〇 ドリンク代 ¥{PRICES.drink.toLocaleString()} を受け取った</p>
                  <p>〇 お釣り ¥{changeAmount?.toLocaleString() || '0'} を渡した</p>
                </div>
              </div>
              
              <button
                onClick={handleCompleteEntry}
                disabled={!drinkTicketGiven || !moneyReceived}
                style={{ width: '100%', backgroundColor: (!drinkTicketGiven || !moneyReceived) ? 'var(--color-background-secondary)' : 'var(--color-background-success)', color: (!drinkTicketGiven || !moneyReceived) ? 'var(--color-text-secondary)' : 'var(--color-text-success)' }}
              >
                受付完了
              </button>
            </div>
          )}

          {page === 'result' && (
            <div style={{ maxWidth: '500px', margin: '0 auto' }}>
              <h1 style={{ fontSize: '24px', fontWeight: 500, marginBottom: '2rem', textAlign: 'center' }}>イベント終了</h1>
              
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '2rem' }}>
                <div style={{ backgroundColor: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '1rem' }}>
                  <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>一般入場</p>
                  <p style={{ fontSize: '24px', fontWeight: 500 }}>{generalCount}人</p>
                </div>
                <div style={{ backgroundColor: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '1rem' }}>
                  <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>TMPメンバー</p>
                  <p style={{ fontSize: '24px', fontWeight: 500 }}>{tmpCount}人</p>
                </div>
                <div style={{ backgroundColor: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '1rem' }}>
                  <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>売上</p>
                  <p style={{ fontSize: '24px', fontWeight: 500 }}>¥{totalRevenue.toLocaleString()}</p>
                </div>
                <div style={{ backgroundColor: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '1rem' }}>
                  <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px' }}>利益</p>
                  <p style={{ fontSize: '24px', fontWeight: 500 }}>¥{profit.toLocaleString()}</p>
                </div>
              </div>
              
              <div style={{ backgroundColor: 'var(--color-background-primary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-lg)', padding: '1.25rem', marginBottom: '2rem' }}>
                <h3 style={{ fontSize: '15px', fontWeight: 500, marginBottom: '1rem' }}>金庫内金額</h3>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', fontSize: '13px' }}>
                  <div>
                    <p style={{ color: 'var(--color-text-secondary)', marginBottom: '4px' }}>開始時金額</p>
                    <p style={{ fontWeight: 500 }}>¥{parseInt(initialAmount).toLocaleString()}</p>
                  </div>
                  <div>
                    <p style={{ color: 'var(--color-text-secondary)', marginBottom: '4px' }}>売上</p>
                    <p style={{ fontWeight: 500 }}>¥{totalRevenue.toLocaleString()}</p>
                  </div>
                  <div style={{ gridColumn: '1 / -1', borderTop: '0.5px solid var(--color-border-tertiary)', paddingTop: '12px' }}>
                    <p style={{ color: 'var(--color-text-secondary)', marginBottom: '4px' }}>計算上の金庫内金額</p>
                    <p style={{ fontSize: '18px', fontWeight: 500 }}>¥{totalAmount.toLocaleString()}</p>
                  </div>
                </div>
              </div>
              
              <div style={{ backgroundColor: 'var(--color-background-primary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-lg)', padding: '1.25rem', marginBottom: '2rem' }}>
                <h3 style={{ fontSize: '15px', fontWeight: 500, marginBottom: '1rem' }}>封筒に記載する情報</h3>
                <div style={{ backgroundColor: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '1rem', fontSize: '14px', lineHeight: '1.8' }}>
                  <p style={{ marginBottom: '8px' }}>{new Date().toLocaleDateString('ja-JP')} tonight!</p>
                  <p style={{ marginBottom: '8px' }}>箱代　¥{PRICES.box.toLocaleString()}</p>
                  <p style={{ marginBottom: '12px' }}>ファーストドリンク　¥{((generalCount + tmpCount) * PRICES.drink).toLocaleString()}</p>
                  <p style={{ borderTop: '0.5px solid var(--color-border-tertiary)', paddingTop: '8px' }}>
                    計　¥{(PRICES.box + (generalCount + tmpCount) * PRICES.drink).toLocaleString()}
                  </p>
                </div>
              </div>
              
              {entries.length > 0 && (
                <div style={{ backgroundColor: 'var(--color-background-primary)', border: '0.5px solid var(--color-border-tertiary)', borderRadius: 'var(--border-radius-lg)', padding: '1.25rem' }}>
                  <h3 style={{ fontSize: '15px', fontWeight: 500, marginBottom: '1rem' }}>来場者アーカイブ</h3>
                  <div style={{ maxHeight: '300px', overflowY: 'auto', fontSize: '13px' }}>
                    {entries.map((entry) => (
                      <div key={entry.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '0.5px solid var(--color-border-tertiary)' }}>
                        <div>
                          <span style={{ color: 'var(--color-text-secondary)' }}>{entry.type === 'general' ? '一般' : 'TMP'}</span>
                          <span style={{ marginLeft: '8px', fontSize: '12px', color: 'var(--color-text-tertiary)' }}>{entry.timestamp}</span>
                        </div>
                        <span style={{ fontWeight: 500 }}>¥{entry.price.toLocaleString()}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              
              <button onClick={() => {
                setPage('setup');
                setInitialAmount('');
                setInitialTickets('');
                setGeneralCount(0);
                setTmpCount(0);
                setEntries([]);
                setPaidAmount('');
                setChangeAmount(null);
                setDrinkTicketGiven(false);
                setMoneyReceived(false);
              }} style={{ width: '100%', marginTop: '2rem' }}>
                新規イベントを開始
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ReceptionApp />);
  </script>
</body>
</html>
